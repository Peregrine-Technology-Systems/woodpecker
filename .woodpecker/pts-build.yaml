when:
  - event: push
    branch: main

labels:
  platform: linux
  backend: local
  tier: ondemand

steps:
  - name: build-and-push
    image: bash
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - scripts/woodpecker/pts-build.sh

  - name: health-check
    image: bash
    commands:
      - |
        echo "==> Waiting for server to restart..."
        for i in $(seq 1 30); do
          VERSION=$(curl -sf https://d3ci42.peregrinetechsys.net/healthz 2>/dev/null | jq -r '.version // empty' 2>/dev/null) || true
          if [ -n "$VERSION" ]; then
            echo "==> Server healthy: $VERSION"
            exit 0
          fi
          sleep 5
        done
        echo "==> ERROR: Server not healthy after 150s"
        exit 1
    depends_on: [build-and-push]

  - name: notify-status
    image: bash
    environment:
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
    commands:
      - scripts/woodpecker/pts-notify.sh
    when:
      - status: [success, failure]
    depends_on: [health-check]
