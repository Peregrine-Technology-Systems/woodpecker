when:
  - event: push
    branch: main

labels:
  platform: linux
  backend: local
  tier: ondemand

steps:
  - name: build-and-push
    image: bash
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - scripts/woodpecker/pts-build.sh

  - name: notify-status
    image: bash
    environment:
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
    commands:
      - scripts/woodpecker/pts-notify.sh
    when:
      - status: [success, failure]
    depends_on: [build-and-push]
